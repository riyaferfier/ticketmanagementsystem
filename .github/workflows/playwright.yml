name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci || npm install

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci || npm install

    - name: Install Python test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-playwright

    - name: Install Playwright Browsers
      run: |
        playwright install --with-deps

    - name: Start backend server
      run: |
        cd backend
        npm start &

    - name: Start frontend server
      run: |
        cd frontend
        npm run dev -- --port 3001 &

    - name: Wait for servers to be ready
      run: |
        npx wait-on http://localhost:5001/api/health http://localhost:3001 -t 60000

    - name: Run Playwright Python tests
      run: |
         pytest tests_python/test_login.py -v --junitxml=results.xml


    - name: Authenticate with Xray
      run: |
        TOKEN=$(curl -s \
          -H "Content-Type: application/json" \
          -X POST \
          --data "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
          https://eu.xray.cloud.getxray.app/api/v2/authenticate)


        echo "Authentication response:"
        echo "$TOKEN"

        TOKEN=$(echo "$TOKEN" | tr -d '"')

        echo "XRAY_TOKEN=$TOKEN" >> $GITHUB_ENV


    - name: Upload results to Xray
      run: |
          echo "Uploading results.xml..."
          ls -l

          RESPONSE=$(curl -s \
            -H "Content-Type: text/xml" \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            --data @results.xml \
            "https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=SCRUM")

          echo "Xray Response:"
          echo "$RESPONSE"  



    
          


    